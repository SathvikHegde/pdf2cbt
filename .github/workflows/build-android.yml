name: Build Android APK

on:
  workflow_dispatch: # This allows you to click a button to start the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Android requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Project Dependencies
        run: pnpm install

      - name: Generate Offline Web Files
        run: pnpm run generate:web

      - name: Setup Capacitor and Android Shell
        run: |
          pnpm add @capacitor/core
          pnpm add -D @capacitor/cli
          
          # Dynamically hunt down the generated web directory
          WEB_DIR=$(find . -type d -path "*/.output/public" | head -n 1)
          if [ -z "$WEB_DIR" ]; then 
            WEB_DIR=$(dirname $(find . -type f -name "index.html" -not -path "*/node_modules/*" | head -n 1))
          fi
          
          echo "Found web files at: $WEB_DIR"
          npx cap init pdf2cbt com.yourname.pdf2cbt --web-dir "$WEB_DIR"
          
          pnpm add @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Compile the APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: pdf2cbt-android-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
